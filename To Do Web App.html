<!DOCTYPE html>
<html>
<head>
    <title>Simple To-Do App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin-top: 40px;
        }

        .container {
            width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        input, select, button {
            padding: 8px;
            margin: 5px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #eee;
            margin: 8px 0;
            padding: 8px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .completed {
            text-decoration: line-through;
            color: gray;
        }

        .task-info {
            text-align: left;
        }

        .buttons button {
            margin-left: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>To-Do App</h2>

    <input type="text" id="taskInput" placeholder="Enter task">
    <input type="datetime-local" id="taskDate">
    <select id="taskList">
        <option value="Personal">Personal</option>
        <option value="Work">Work</option>
        <option value="Study">Study</option>
    </select>
    <br>
    <button onclick="addTask()">Add Task</button>

    <ul id="taskContainer"></ul>
</div>

<script>
function addTask() {
    const taskText = document.getElementById("taskInput").value;
    const taskDate = document.getElementById("taskDate").value;
    const taskList = document.getElementById("taskList").value;

    if (taskText === "") {
        alert("Please enter a task");
        return;
    }

    const li = document.createElement("li");

    const taskInfo = document.createElement("div");
    taskInfo.className = "task-info";
    taskInfo.innerHTML = "<strong>" + taskText + "</strong><br>" +
                         "List: " + taskList + "<br>" +
                         "Due: " + taskDate;

    const buttons = document.createElement("div");
    buttons.className = "buttons";

    const completeBtn = document.createElement("button");
    completeBtn.innerText = "✔";
    completeBtn.onclick = function() {
        taskInfo.classList.toggle("completed");
    };

    const editBtn = document.createElement("button");
    editBtn.innerText = "Edit";
    editBtn.onclick = function() {
        const newTask = prompt("Edit task:", taskText);
        if (newTask !== null) {
            taskInfo.innerHTML = "<strong>" + newTask + "</strong><br>" +
                                 "List: " + taskList + "<br>" +
                                 "Due: " + taskDate;
        }
    };

    const deleteBtn = document.createElement("button");
    deleteBtn.innerText = "Delete";
    deleteBtn.onclick = function() {
        li.remove();
    };

    buttons.appendChild(completeBtn);
    buttons.appendChild(editBtn);
    buttons.appendChild(deleteBtn);

    li.appendChild(taskInfo);
    li.appendChild(buttons);

    document.getElementById("taskContainer").appendChild(li);

    document.getElementById("taskInput").value = "";
    document.getElementById("taskDate").value = "";
}
</script>

</body>
</html>
